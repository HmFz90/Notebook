<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Paper Clips — crop PDF pages onto A4 sheets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
/* ============================================================
   Paper Clips — design tokens
   Left bench = dark "light table" (inspect & clip)
   Right bench = warm workbench with white A4 sheet (compose)
   ============================================================ */
:root{
  --bg:#E9E6DE;            /* warm workbench */
  --panel:#F7F6F2;         /* paper panels */
  --bench-dark:#2A2D33;    /* light-table surround */
  --bench-dark2:#22252A;
  --ink:#23262B;
  --ink-soft:#5B6068;
  --line:#D6D2C8;
  --line-dark:#3A3E45;
  --accent:#0C6B61;        /* petrol / surgical drape */
  --accent-soft:#0C6B6122;
  --danger:#B3412C;
  --sheet-shadow:0 2px 6px rgba(30,32,36,.18),0 14px 34px rgba(30,32,36,.16);
  --radius:8px;
  --font:"Avenir Next","Avenir",Seravek,"Segoe UI",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);color:var(--ink);background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;font-size:14px;
}
button{font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);padding:6px 12px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500}
button:hover:not(:disabled){border-color:var(--ink-soft)}
button:disabled{opacity:.45;cursor:default}
button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
button.primary:hover:not(:disabled){background:#0A5A52}
button.ghost{background:transparent;border-color:transparent}
button.danger{color:var(--danger)}
select,input[type=range]{font-family:inherit;font-size:13px}
select{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:5px 8px;max-width:180px;color:var(--ink)}
kbd{font:inherit;font-size:11px;color:var(--ink-soft)}

/* ---------- top bar ---------- */
#topbar{
  display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);
  border-bottom:1px solid var(--line);flex:none;z-index:30;
}
#brand{font-size:15px;font-weight:600;letter-spacing:.01em;margin-right:6px;display:flex;align-items:center;gap:8px}
#brand .mark{width:18px;height:18px;border:2px solid var(--ink);border-radius:3px;position:relative;flex:none}
#brand .mark::after{content:"";position:absolute;inset:3px -6px -6px 3px;border:2px solid var(--accent);border-radius:3px;background:var(--panel)}
.spacer{flex:1}
.sep{width:1px;height:22px;background:var(--line);margin:0 4px}

/* ---------- split layout ---------- */
#split{flex:1;display:flex;min-height:0}
section.pane{display:flex;flex-direction:column;min-width:0;min-height:0}
#cropPane{flex:0 0 42%;background:var(--bench-dark);color:#E7E5DF}
#layoutPane{flex:1;background:var(--bg)}
#divider{width:1px;background:var(--line);flex:none}

.paneHead{display:flex;align-items:center;gap:8px;padding:8px 12px;flex:none;flex-wrap:wrap}
#cropPane .paneHead{border-bottom:1px solid var(--line-dark)}
#layoutPane .paneHead{border-bottom:1px solid var(--line)}
#cropPane button{background:#33373E;border-color:var(--line-dark);color:#E7E5DF}
#cropPane button:hover:not(:disabled){border-color:#7C828C}
#cropPane button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
#cropPane select{background:#33373E;border-color:var(--line-dark);color:#E7E5DF}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
#cropPane .eyebrow{color:#9BA1AB}
.counter{font-variant-numeric:tabular-nums;font-size:13px;min-width:58px;text-align:center}

/* ---------- crop bench ---------- */
#cropScroll{flex:1;overflow:auto;display:grid;place-items:center;padding:26px;position:relative;
  background:
    linear-gradient(var(--bench-dark2) 1px,transparent 1px) 0 0/100% 28px,
    linear-gradient(90deg,var(--bench-dark2) 1px,transparent 1px) 0 0/28px 100%,
    var(--bench-dark);}
#cropWrap{position:relative;flex:none;box-shadow:0 6px 30px rgba(0,0,0,.5);touch-action:none;display:none}
#cropCanvas{display:block;background:#fff}
#cropHint{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:#9BA1AB;padding:20px;pointer-events:none}
#cropHint .big{font-size:16px;font-weight:600;color:#C9CCD3;margin-bottom:6px}
#busy{position:absolute;inset:0;display:grid;place-items:center;background:rgba(34,37,42,.55);color:#fff;font-weight:600;z-index:5}

/* crop rectangle with printers' marks */
#cropRect{position:absolute;border:1px solid #7FD8CD;box-shadow:0 0 0 9999px rgba(20,22,26,.55);cursor:move;touch-action:none}
#cropRect .mark{position:absolute;width:16px;height:16px;pointer-events:none}
#cropRect .mark::before,#cropRect .mark::after{content:"";position:absolute;background:#7FD8CD}
#cropRect .mark::before{width:14px;height:2px}
#cropRect .mark::after{width:2px;height:14px}
#cropRect .m-nw{left:-19px;top:-19px}#cropRect .m-nw::before{right:0;top:0}#cropRect .m-nw::after{right:0;top:0}
#cropRect .m-ne{right:-19px;top:-19px}#cropRect .m-ne::before{left:0;top:0}#cropRect .m-ne::after{left:0;top:0}
#cropRect .m-sw{left:-19px;bottom:-19px}#cropRect .m-sw::before{right:0;bottom:0}#cropRect .m-sw::after{right:0;bottom:0}
#cropRect .m-se{right:-19px;bottom:-19px}#cropRect .m-se::before{left:0;bottom:0}#cropRect .m-se::after{left:0;bottom:0}
.h{position:absolute;width:16px;height:16px;background:#fff;border:2px solid var(--accent);border-radius:3px;touch-action:none}
#cropRect .h{background:#22252A;border-color:#7FD8CD}
.h[data-h=nw]{left:-8px;top:-8px;cursor:nwse-resize}
.h[data-h=n]{left:calc(50% - 8px);top:-8px;cursor:ns-resize}
.h[data-h=ne]{right:-8px;top:-8px;cursor:nesw-resize}
.h[data-h=e]{right:-8px;top:calc(50% - 8px);cursor:ew-resize}
.h[data-h=se]{right:-8px;bottom:-8px;cursor:nwse-resize}
.h[data-h=s]{left:calc(50% - 8px);bottom:-8px;cursor:ns-resize}
.h[data-h=sw]{left:-8px;bottom:-8px;cursor:nesw-resize}
.h[data-h=w]{left:-8px;top:calc(50% - 8px);cursor:ew-resize}
#cropDims{position:absolute;top:-26px;left:0;font-size:11px;color:#7FD8CD;font-variant-numeric:tabular-nums;white-space:nowrap}
.paneFoot{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line-dark);flex:none}
#zoomWrap{display:flex;align-items:center;gap:6px;color:#9BA1AB;font-size:12px}
#cropZoom{width:90px}

/* ---------- sheet bench ---------- */
#pageScroll{flex:1;overflow:auto;padding:26px;display:grid;place-items:start center}
.a4page{position:relative;background:#fff;box-shadow:var(--sheet-shadow);flex:none;touch-action:manipulation}
.obj{position:absolute;touch-action:none;user-select:none;-webkit-user-select:none}
.obj img{width:100%;height:100%;display:block;pointer-events:none}
.obj.selected{outline:2px solid var(--accent);outline-offset:0}
.obj .h{display:none;z-index:6}
.obj.selected .h{display:block}
.obj.text{white-space:pre-wrap;word-break:break-word;line-height:1.3;cursor:default;min-height:1em}
.obj.text.editing{outline:2px dashed var(--accent);cursor:text}
#objTools{display:none;align-items:center;gap:6px}
#objTools.show{display:flex}
#textTools{display:none;align-items:center;gap:6px}
#textTools.show{display:flex}
input[type=color]{width:30px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel);padding:2px;cursor:pointer}

/* ---------- misc ---------- */
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:9px 16px;border-radius:10px;font-size:13px;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:80vw}
#dropVeil{position:fixed;inset:0;background:var(--accent-soft);border:3px dashed var(--accent);z-index:90;display:none;pointer-events:none}
#tabs{display:none;flex:none;border-top:1px solid var(--line);background:var(--panel)}
#tabs button{flex:1;border:none;border-radius:0;padding:11px;background:transparent}
#tabs button.on{color:var(--accent);font-weight:700;box-shadow:inset 0 3px 0 var(--accent)}
#testOverlay{position:fixed;inset:5% 8%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
  z-index:120;padding:18px;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
#testOverlay pre{font:12px ui-monospace,Menlo,monospace;white-space:pre-wrap;margin-top:10px}
.pass{color:var(--accent)}.fail{color:var(--danger);font-weight:700}
[hidden]{display:none !important}

@media (max-width:900px){
  #cropPane{flex:1}
  #split section.pane{display:none}
  #split section.pane.active{display:flex}
  #divider{display:none}
  #tabs{display:flex}
  .paneHead{padding:8px}
}
</style>
</head>
<body>

<header id="topbar">
  <div id="brand"><span class="mark"></span>Paper Clips</div>
  <button id="openBtn" title="Open PDFs or images">Open…</button>
  <button id="addTextBtn" title="Add a text box to the sheet">Add text</button>
  <span class="sep"></span>
  <button id="undoBtn" class="ghost" title="Undo (⌘Z)">↩︎</button>
  <button id="redoBtn" class="ghost" title="Redo (⇧⌘Z)">↪︎</button>
  <div class="spacer"></div>
  <button id="testsBtn" class="ghost" title="Run built-in tests">🧪</button>
  <button id="exportBtn" class="primary">Export PDF</button>
</header>

<main id="split">
  <!-- ============ LEFT: clipping bench (light table) ============ -->
  <section class="pane active" id="cropPane">
    <div class="paneHead">
      <span class="eyebrow">Clip</span>
      <select id="srcSel" title="Loaded source PDFs" hidden></select>
      <span class="sep" style="background:var(--line-dark)"></span>
      <button id="prevPg" title="Previous page" disabled>◀</button>
      <span class="counter" id="pgCounter">– / –</span>
      <button id="nextPg" title="Next page" disabled>▶</button>
      <div class="spacer"></div>
      <div id="zoomWrap"><span>Zoom</span><input type="range" id="cropZoom" min="50" max="300" value="100"><span id="zoomVal">100%</span></div>
    </div>
    <div id="cropScroll">
      <div id="cropHint"><div><div class="big">Drop a PDF to start clipping</div>Drag on the page to draw a crop · Send it to the sheet</div></div>
      <div id="cropWrap">
        <canvas id="cropCanvas"></canvas>
        <div id="cropRect" hidden>
          <span class="mark m-nw"></span><span class="mark m-ne"></span><span class="mark m-sw"></span><span class="mark m-se"></span>
          <div class="h" data-h="nw"></div><div class="h" data-h="n"></div><div class="h" data-h="ne"></div><div class="h" data-h="e"></div>
          <div class="h" data-h="se"></div><div class="h" data-h="s"></div><div class="h" data-h="sw"></div><div class="h" data-h="w"></div>
          <div id="cropDims"></div>
        </div>
        <div id="busy" hidden>Rendering…</div>
      </div>
    </div>
    <div class="paneFoot">
      <button id="cancelEditBtn" hidden>✕ Cancel re-crop</button>
      <div class="spacer"></div>
      <button id="clearCropBtn" hidden>Clear crop</button>
      <button id="sendBtn" class="primary" disabled>Send full page →</button>
    </div>
  </section>

  <div id="divider"></div>

  <!-- ============ RIGHT: worksheet bench ============ -->
  <section class="pane" id="layoutPane">
    <div class="paneHead">
      <span class="eyebrow">Sheet</span>
      <button id="prevSheet" title="Previous sheet">◀</button>
      <span class="counter" id="sheetCounter">1 / 1</span>
      <button id="nextSheet" title="Next sheet">▶</button>
      <button id="addSheet" title="Add a sheet">＋</button>
      <button id="delSheet" class="danger" title="Delete this sheet">🗑</button>
      <div class="spacer"></div>
      <div id="objTools">
        <div id="textTools">
          <button id="fontMinus" title="Smaller text">A−</button>
          <button id="fontPlus" title="Larger text">A＋</button>
          <input type="color" id="textColor" value="#23262B" title="Text color">
        </div>
        <button id="toFront" title="Bring to front">⬆︎</button>
        <button id="toBack" title="Send to back">⬇︎</button>
        <button id="dupObj" title="Duplicate">⧉</button>
        <button id="delObj" class="danger" title="Delete (⌫)">Delete</button>
      </div>
    </div>
    <div id="pageScroll"><div class="a4page" id="a4"></div></div>
  </section>
</main>

<div id="tabs">
  <button data-t="cropPane" class="on">Clip</button>
  <button data-t="layoutPane">Sheet</button>
</div>

<div id="dropVeil"></div>
<div id="toast" hidden></div>
<div id="testOverlay" hidden>
  <button id="closeTests" style="float:right">Close</button>
  <strong>Paper Clips — test suite</strong>
  <pre id="testOut"></pre>
</div>
<input type="file" id="fileInput" hidden multiple accept="application/pdf,image/*">

<script id="app">
"use strict";
/* ================================================================
   Paper Clips v1
   Clip regions from PDF pages (vector-preserved) + images + text
   onto multipage A4 sheets, then export a new PDF.
   Engine: pdf.js (preview) + pdf-lib (vector export via embedPage)
   ================================================================ */

const A4 = { w: 595.28, h: 841.89 };            // points
const { PDFDocument, StandardFonts, rgb, degrees } = PDFLib;
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* __PURE_START__ ------------------------------------------------
   Pure geometry / logic — covered by the built-in test suite and
   verifiable in Node. No DOM, no libraries.
------------------------------------------------------------------ */
function normRot(r){ return ((Math.round(r) % 360) + 360) % 360; }

function bboxFromPdfPoints(p1, p2){
  return { left: Math.min(p1[0], p2[0]), right: Math.max(p1[0], p2[0]),
           bottom: Math.min(p1[1], p2[1]), top: Math.max(p1[1], p2[1]) };
}

/* Visual size of a clipped region once the page's /Rotate is applied */
function visualDims(bbox, rot){
  const bw = bbox.right - bbox.left, bh = bbox.top - bbox.bottom;
  return (normRot(rot) % 180 === 90) ? { w: bh, h: bw } : { w: bw, h: bh };
}

/* pdf-lib drawPage applies translate → rotate → scale.
   Given the target rect (ox, oyBottom, ow, oh) on the output page and the
   source page rotation, return drawPage params that reproduce the on-screen
   orientation. Derivation: rotate about the anchor, then re-anchor. */
function drawParamsFor(rot, ox, oyBottom, ow, oh){
  switch (normRot(rot)) {
    case 90:  return { x: ox,      y: oyBottom + oh, width: oh, height: ow, deg: -90 };
    case 180: return { x: ox + ow, y: oyBottom + oh, width: ow, height: oh, deg: 180 };
    case 270: return { x: ox + ow, y: oyBottom,      width: oh, height: ow, deg: 90  };
    default:  return { x: ox,      y: oyBottom,      width: ow, height: oh, deg: 0   };
  }
}

/* UI stores objects with top-left origin; PDF wants bottom-left */
function pdfYFromTop(pageH, yTop, objH){ return pageH - yTop - objH; }

function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

function fitWithin(w, h, maxW, maxH){
  const s = Math.min(maxW / w, maxH / h, 1);
  return { w: w * s, h: h * s };
}

/* Helvetica (WinAnsi). Keep Latin-1 + the WinAnsi extras; replace the rest. */
const WINANSI_EXTRA = "\u20AC\u201A\u0192\u201E\u2026\u2020\u2021\u02C6\u2030\u0160\u2039\u0152\u017D\u2018\u2019\u201C\u201D\u2022\u2013\u2014\u02DC\u2122\u0161\u203A\u0153\u017E\u0178";
function sanitizeWinAnsi(s){
  let out = "";
  for (const ch of String(s).replace(/\r/g, "")) {
    out += (ch === "\n" || ch <= "\u00FF" || WINANSI_EXTRA.includes(ch)) ? ch : "?";
  }
  return out;
}

function cascadeOffset(n){ return (n % 8) * 14; }

/* Undo/redo over serialized snapshots */
function makeHistory(cap){
  const undo = [], redo = [];
  return {
    commit(snap){ undo.push(snap); if (undo.length > cap) undo.shift(); redo.length = 0; },
    undo(cur){ if (!undo.length) return null; redo.push(cur); return undo.pop(); },
    redo(cur){ if (!redo.length) return null; undo.push(cur); return redo.pop(); },
    sizes(){ return { u: undo.length, r: redo.length }; }
  };
}
/* __PURE_END__ -------------------------------------------------- */

/* ---------------- state ---------------- */
const state = {
  sources: [],                 // {id,name,bytes:Uint8Array,doc:pdfjsDoc,numPages}
  curSrc: null, curPage: 1,
  viewport: null, zoom: 1, pageRot: 0,
  crop: null,                  // {x,y,w,h} in CSS px on crop canvas
  sheets: [{ id: uid(), objects: [] }],
  curSheet: 0,
  sel: null,                   // selected object id
  editObj: null,               // snippet id being re-cropped
  k: 1                         // sheet scale: px per pt
};
const previews = new Map();    // previewId -> dataURL / objectURL
const assets = new Map();      // assetId -> {bytes:Uint8Array, mime}
const history = makeHistory(50);
function uid(){ return Math.random().toString(36).slice(2, 10); }

const $ = id => document.getElementById(id);
const els = ["srcSel","prevPg","nextPg","pgCounter","cropZoom","zoomVal","cropScroll","cropWrap",
  "cropCanvas","cropRect","cropHint","cropDims","busy","sendBtn","clearCropBtn","cancelEditBtn",
  "a4","pageScroll","sheetCounter","prevSheet","nextSheet","addSheet","delSheet",
  "objTools","textTools","toFront","toBack","dupObj","delObj","fontMinus","fontPlus","textColor",
  "openBtn","addTextBtn","undoBtn","redoBtn","exportBtn","fileInput","toast","dropVeil",
  "testsBtn","testOverlay","testOut","closeTests","tabs"
].reduce((o, id) => (o[id] = $(id), o), {});

/* ---------------- toast ---------------- */
let toastT;
function toast(msg, ms = 2600){
  els.toast.textContent = msg; els.toast.hidden = false;
  clearTimeout(toastT); toastT = setTimeout(() => els.toast.hidden = true, ms);
}

/* ---------------- history plumbing ---------------- */
function snapshot(){ return JSON.stringify({ sheets: state.sheets, curSheet: state.curSheet }); }
function restore(json){
  const s = JSON.parse(json);
  state.sheets = s.sheets; state.curSheet = Math.min(s.curSheet, s.sheets.length - 1);
  state.sel = null; renderSheet();
}
function commit(){ history.commit(snapshot()); }
function doUndo(){ const s = history.undo(snapshot()); if (s) { restore(s); } }
function doRedo(){ const s = history.redo(snapshot()); if (s) { restore(s); } }

/* ================================================================
   SOURCES & CLIPPING BENCH
   ================================================================ */
async function addPdf(file){
  try {
    const bytes = new Uint8Array(await file.arrayBuffer());
    // pdf.js transfers its buffer to the worker → give it a copy, keep the original for export
    const doc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;
    const src = { id: uid(), name: file.name, bytes, doc, numPages: doc.numPages };
    state.sources.push(src);
    const opt = document.createElement("option");
    opt.value = src.id; opt.textContent = `${src.name} (${src.numPages} p.)`;
    els.srcSel.appendChild(opt);
    els.srcSel.hidden = false;
    els.srcSel.value = src.id;
    await showSource(src.id, 1);
    toast(`Loaded ${src.name}`);
  } catch (e) {
    console.error(e);
    toast(`Could not open ${file.name} — ${/password/i.test(e.message||"") ? "it is password-protected" : "unsupported or damaged PDF"}`);
  }
}

async function showSource(srcId, pageNum, keepCrop = false){
  state.curSrc = state.sources.find(s => s.id === srcId) || null;
  if (!state.curSrc) return;
  state.curPage = clamp(pageNum, 1, state.curSrc.numPages);
  if (!keepCrop) setCrop(null);
  await renderCropPage();
  updateCropUI();
}

let renderToken = 0;
async function renderCropPage(){
  const src = state.curSrc; if (!src) return;
  const my = ++renderToken;
  els.busy.hidden = false;
  try {
    const page = await src.doc.getPage(state.curPage);
    state.pageRot = normRot(page.rotate || 0);
    const base = page.getViewport({ scale: 1 });
    const paneW = Math.max(220, els.cropScroll.clientWidth - 60);
    const paneH = Math.max(220, els.cropScroll.clientHeight - 60);
    const fit = Math.min(paneW / base.width, paneH / base.height);
    const scale = fit * state.zoom;
    const vp = page.getViewport({ scale });
    if (my !== renderToken) return;                      // superseded
    state.viewport = vp;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    // memory guard (iPad): cap backing store area
    const capped = Math.min(dpr, Math.sqrt(16e6 / (vp.width * vp.height)) || dpr, 3);
    const c = els.cropCanvas;
    c.width = Math.round(vp.width * capped); c.height = Math.round(vp.height * capped);
    c.style.width = vp.width + "px"; c.style.height = vp.height + "px";
    els.cropWrap.style.display = "block";
    els.cropHint.hidden = true;
    await page.render({ canvasContext: c.getContext("2d"), viewport: vp,
                        transform: [capped, 0, 0, capped, 0, 0] }).promise;
  } catch (e) {
    console.error(e); toast("Failed to render page");
  } finally {
    if (my === renderToken) els.busy.hidden = true;
  }
}

function updateCropUI(){
  const src = state.curSrc;
  els.pgCounter.textContent = src ? `${state.curPage} / ${src.numPages}` : "– / –";
  els.prevPg.disabled = !src || state.curPage <= 1;
  els.nextPg.disabled = !src || state.curPage >= src.numPages;
  els.sendBtn.disabled = !src;
  els.clearCropBtn.hidden = !state.crop;
  els.sendBtn.textContent = state.editObj
    ? "Update crop ✓"
    : (state.crop ? "Send to sheet →" : "Send full page →");
  els.cancelEditBtn.hidden = !state.editObj;
  drawCropRect();
}

function setCrop(rect){ state.crop = rect; drawCropRect(); updateCropUI(); }

function drawCropRect(){
  const r = state.crop, el = els.cropRect;
  if (!r) { el.hidden = true; return; }
  el.hidden = false;
  el.style.left = r.x + "px"; el.style.top = r.y + "px";
  el.style.width = r.w + "px"; el.style.height = r.h + "px";
  if (state.viewport) {
    const b = cropToBBox(r), v = visualDims(b, state.pageRot);
    els.cropDims.textContent = `${(v.w/72*25.4).toFixed(0)} × ${(v.h/72*25.4).toFixed(0)} mm`;
  }
}

function cropToBBox(rect){
  const vp = state.viewport;
  const p1 = vp.convertToPdfPoint(rect.x, rect.y);
  const p2 = vp.convertToPdfPoint(rect.x + rect.w, rect.y + rect.h);
  return bboxFromPdfPoints(p1, p2);
}
function fullPageBBox(){
  // page.view = [x0,y0,x1,y1] in pdf units (unrotated)
  return { left: curView[0], bottom: curView[1], right: curView[2], top: curView[3] };
}
let curView = [0, 0, A4.w, A4.h];
async function refreshView(){
  if (!state.curSrc) return;
  const p = await state.curSrc.doc.getPage(state.curPage);
  curView = p.view;
}

/* --- crop rect drawing / dragging / resizing (mouse + touch) --- */
(function cropInteractions(){
  const wrap = els.cropWrap, rectEl = els.cropRect;
  let mode = null, start = null, orig = null, handle = null;

  function local(e){
    const r = wrap.getBoundingClientRect();
    return { x: clamp(e.clientX - r.left, 0, r.width), y: clamp(e.clientY - r.top, 0, r.height) };
  }
  wrap.addEventListener("pointerdown", e => {
    if (!state.curSrc || els.busy.hidden === false) return;
    const t = e.target;
    if (t.classList.contains("h")) { mode = "resize"; handle = t.dataset.h; orig = { ...state.crop }; }
    else if (t === rectEl || rectEl.contains(t)) { mode = "move"; orig = { ...state.crop }; }
    else { mode = "new"; const p = local(e); setCrop({ x: p.x, y: p.y, w: 0, h: 0 }); orig = { ...state.crop }; }
    start = local(e);
    wrap.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  wrap.addEventListener("pointermove", e => {
    if (!mode) return;
    const p = local(e), dx = p.x - start.x, dy = p.y - start.y;
    const W = parseFloat(els.cropCanvas.style.width), H = parseFloat(els.cropCanvas.style.height);
    let r = { ...orig };
    if (mode === "new") {
      r = { x: Math.min(orig.x, p.x), y: Math.min(orig.y, p.y), w: Math.abs(p.x - orig.x), h: Math.abs(p.y - orig.y) };
    } else if (mode === "move") {
      r.x = clamp(orig.x + dx, 0, W - orig.w); r.y = clamp(orig.y + dy, 0, H - orig.h);
    } else {
      if (handle.includes("e")) r.w = clamp(orig.w + dx, 8, W - orig.x);
      if (handle.includes("s")) r.h = clamp(orig.h + dy, 8, H - orig.y);
      if (handle.includes("w")) { const nx = clamp(orig.x + dx, 0, orig.x + orig.w - 8); r.w = orig.w + (orig.x - nx); r.x = nx; }
      if (handle.includes("n")) { const ny = clamp(orig.y + dy, 0, orig.y + orig.h - 8); r.h = orig.h + (orig.y - ny); r.y = ny; }
    }
    setCrop(r);
  });
  const up = e => {
    if (mode === "new" && state.crop && (state.crop.w < 8 || state.crop.h < 8)) setCrop(null);
    mode = null;
  };
  wrap.addEventListener("pointerup", up);
  wrap.addEventListener("pointercancel", up);
})();

/* --- send crop → sheet (or update during re-crop) --- */
async function sendCrop(){
  const src = state.curSrc; if (!src) return;
  await refreshView();
  const bbox = state.crop ? cropToBBox(state.crop) : fullPageBBox();
  if (bbox.right - bbox.left < 2 || bbox.top - bbox.bottom < 2) { toast("Crop is too small"); return; }
  const rot = state.pageRot;
  const vis = visualDims(bbox, rot);

  els.busy.hidden = false;
  try {
    const dataURL = await renderSnippetPreview(src, state.curPage, bbox);
    const pvId = uid(); previews.set(pvId, dataURL);
    commit();
    if (state.editObj) {
      const o = findObj(state.editObj);
      if (o) {
        o.srcId = src.id; o.srcPage = state.curPage; o.bbox = bbox; o.rot = rot;
        o.previewId = pvId;
        o.h = o.w * (vis.h / vis.w);                    // keep width, follow new aspect
      }
      exitEditMode();
      toast("Crop updated");
    } else {
      const sheet = state.sheets[state.curSheet];
      const size = fitWithin(vis.w, vis.h, A4.w * 0.62, A4.h * 0.62);
      const off = cascadeOffset(sheet.objects.length);
      sheet.objects.push({
        id: uid(), type: "snippet",
        x: clamp((A4.w - size.w) / 2 + off, 0, A4.w - size.w),
        y: clamp((A4.h - size.h) / 3 + off, 0, A4.h - size.h),
        w: size.w, h: size.h,
        srcId: src.id, srcPage: state.curPage, bbox, rot, previewId: pvId
      });
      state.sel = sheet.objects[sheet.objects.length - 1].id;
      toast("Sent to sheet");
    }
    renderSheet();
    if (window.innerWidth <= 900) switchTab("layoutPane");
  } catch (e) {
    console.error(e); toast("Could not create the clip");
  } finally { els.busy.hidden = true; }
}

async function renderSnippetPreview(src, pageNum, bbox){
  const page = await src.doc.getPage(pageNum);
  const vis = visualDims(bbox, normRot(page.rotate || 0));
  const scale = clamp(1600 / Math.max(vis.w, vis.h), 1, 6);
  const vp = page.getViewport({ scale });
  const c1 = vp.convertToViewportPoint(bbox.left, bbox.bottom);
  const c2 = vp.convertToViewportPoint(bbox.right, bbox.top);
  const x0 = Math.min(c1[0], c2[0]), y0 = Math.min(c1[1], c2[1]);
  const w = Math.max(2, Math.round(Math.abs(c2[0] - c1[0])));
  const h = Math.max(2, Math.round(Math.abs(c2[1] - c1[1])));
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  await page.render({ canvasContext: cv.getContext("2d"), viewport: vp,
                      transform: [1, 0, 0, 1, -x0, -y0] }).promise;
  return cv.toDataURL("image/jpeg", 0.88);
}

function enterEditMode(obj){
  state.editObj = obj.id;
  const src = state.sources.find(s => s.id === obj.srcId);
  if (!src) { toast("Source PDF is no longer loaded"); state.editObj = null; return; }
  els.srcSel.value = src.id;
  showSource(src.id, obj.srcPage, true).then(() => {
    const vp = state.viewport;
    const c1 = vp.convertToViewportPoint(obj.bbox.left, obj.bbox.bottom);
    const c2 = vp.convertToViewportPoint(obj.bbox.right, obj.bbox.top);
    setCrop({ x: Math.min(c1[0], c2[0]), y: Math.min(c1[1], c2[1]),
              w: Math.abs(c2[0] - c1[0]), h: Math.abs(c2[1] - c1[1]) });
    if (window.innerWidth <= 900) switchTab("cropPane");
    toast("Re-cropping — adjust and press Update");
  });
}
function exitEditMode(){ state.editObj = null; setCrop(null); updateCropUI(); }

/* ================================================================
   SHEET BENCH (multipage A4)
   ================================================================ */
function sheet(){ return state.sheets[state.curSheet]; }
function findObj(id){ for (const sh of state.sheets) { const o = sh.objects.find(o => o.id === id); if (o) return o; } return null; }

function computeK(){
  const w = els.pageScroll.clientWidth - 60;
  state.k = clamp(w / A4.w, 0.35, 2.2);
}

function renderSheet(){
  computeK();
  const k = state.k, pg = els.a4;
  pg.style.width = A4.w * k + "px"; pg.style.height = A4.h * k + "px";
  pg.innerHTML = "";
  for (const o of sheet().objects) pg.appendChild(objectEl(o, k));
  els.sheetCounter.textContent = `${state.curSheet + 1} / ${state.sheets.length}`;
  els.prevSheet.disabled = state.curSheet === 0;
  els.nextSheet.disabled = state.curSheet === state.sheets.length - 1;
  els.delSheet.disabled = state.sheets.length === 1;
  syncTools();
}

function objectEl(o, k){
  const d = document.createElement("div");
  d.className = "obj " + o.type;
  d.dataset.id = o.id;
  d.style.left = o.x * k + "px"; d.style.top = o.y * k + "px";
  d.style.width = o.w * k + "px";
  if (o.type !== "text") d.style.height = o.h * k + "px";
  if (o.id === state.sel) d.classList.add("selected");

  if (o.type === "text") {
    d.textContent = o.text;
    d.style.fontSize = o.size * k + "px";
    d.style.color = o.color;
    d.style.fontFamily = "Helvetica, Arial, sans-serif";
  } else {
    const img = document.createElement("img");
    img.src = previews.get(o.previewId) || "";
    img.alt = ""; img.draggable = false;
    d.appendChild(img);
  }
  // resize handles: corners for media (aspect-locked), east/west for text (width)
  const hs = o.type === "text" ? ["e", "w"] : ["nw", "ne", "sw", "se"];
  for (const h of hs) { const el = document.createElement("div"); el.className = "h"; el.dataset.h = h; d.appendChild(el); }
  return d;
}

function select(id){
  state.sel = id;
  els.a4.querySelectorAll(".obj").forEach(el => el.classList.toggle("selected", el.dataset.id === id));
  syncTools();
}
function syncTools(){
  const o = state.sel ? findObj(state.sel) : null;
  els.objTools.classList.toggle("show", !!o);
  els.textTools.classList.toggle("show", !!o && o.type === "text");
  if (o && o.type === "text") els.textColor.value = o.color;
}

/* --- move / resize objects (pointer events, iPad-friendly) --- */
(function sheetInteractions(){
  let mode = null, start = null, orig = null, handle = null, target = null, moved = false;

  els.a4.addEventListener("pointerdown", e => {
    const objEl = e.target.closest(".obj");
    if (!objEl) { select(null); return; }
    if (objEl.classList.contains("editing")) return;      // typing in a text box
    const o = findObj(objEl.dataset.id); if (!o) return;
    select(o.id);
    target = o; moved = false;
    start = { x: e.clientX, y: e.clientY };
    orig = { x: o.x, y: o.y, w: o.w, h: o.h };
    if (e.target.classList.contains("h")) { mode = "resize"; handle = e.target.dataset.h; }
    else mode = "move";
    els.a4.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  els.a4.addEventListener("pointermove", e => {
    if (!mode || !target) return;
    const k = state.k;
    const dx = (e.clientX - start.x) / k, dy = (e.clientY - start.y) / k;
    if (Math.abs(dx) + Math.abs(dy) > 0.5 && !moved) { commit(); moved = true; }
    if (mode === "move") {
      target.x = clamp(orig.x + dx, -orig.w * 0.6, A4.w - orig.w * 0.4);
      target.y = clamp(orig.y + dy, 0, A4.h - 10);
    } else if (target.type === "text") {
      if (handle === "e") target.w = clamp(orig.w + dx, 40, A4.w - orig.x);
      else { const nx = clamp(orig.x + dx, 0, orig.x + orig.w - 40); target.w = orig.w + (orig.x - nx); target.x = nx; }
    } else {
      // aspect-locked corner resize
      const asp = orig.w / orig.h;
      let w = orig.w, h = orig.h, x = orig.x, y = orig.y;
      const sgnX = handle.includes("w") ? -1 : 1;
      w = clamp(orig.w + sgnX * dx, 14, A4.w * 1.5); h = w / asp;
      if (handle.includes("w")) x = orig.x + (orig.w - w);
      if (handle.includes("n")) y = orig.y + (orig.h - h);
      target.w = w; target.h = h; target.x = x; target.y = y;
    }
    paint(target);
  });

  function paint(o){
    const el = els.a4.querySelector(`.obj[data-id="${o.id}"]`); if (!el) return;
    const k = state.k;
    el.style.left = o.x * k + "px"; el.style.top = o.y * k + "px";
    el.style.width = o.w * k + "px";
    if (o.type !== "text") el.style.height = o.h * k + "px";
  }
  const up = () => { mode = null; target = null; };
  els.a4.addEventListener("pointerup", up);
  els.a4.addEventListener("pointercancel", up);

  /* double-click: edit text / re-crop snippet */
  els.a4.addEventListener("dblclick", e => {
    const objEl = e.target.closest(".obj"); if (!objEl) return;
    const o = findObj(objEl.dataset.id); if (!o) return;
    if (o.type === "text") startTextEdit(objEl, o);
    else if (o.type === "snippet") enterEditMode(o);
  });
})();

function startTextEdit(el, o){
  commit();
  el.classList.add("editing");
  el.contentEditable = "true";
  el.focus();
  document.getSelection()?.selectAllChildren(el);
  const done = () => {
    el.contentEditable = "false"; el.classList.remove("editing");
    o.text = el.innerText.replace(/\u00A0/g, " ");
    if (!o.text.trim()) { sheet().objects = sheet().objects.filter(x => x.id !== o.id); state.sel = null; }
    renderSheet();
  };
  el.addEventListener("blur", done, { once: true });
  el.addEventListener("keydown", ev => { if (ev.key === "Escape") el.blur(); ev.stopPropagation(); });
}

function addText(){
  commit();
  const o = { id: uid(), type: "text", x: A4.w * 0.12, y: A4.h * 0.12 + cascadeOffset(sheet().objects.length),
              w: A4.w * 0.5, size: 14, color: "#23262B", text: "Double-click to edit" };
  sheet().objects.push(o);
  state.sel = o.id;
  renderSheet();
}

async function addImage(file){
  try {
    let bytes = new Uint8Array(await file.arrayBuffer());
    let mime = file.type;
    if (mime !== "image/png" && mime !== "image/jpeg") {       // normalize exotic formats to PNG
      const bmp = await createImageBitmap(file);
      const cv = document.createElement("canvas"); cv.width = bmp.width; cv.height = bmp.height;
      cv.getContext("2d").drawImage(bmp, 0, 0);
      const blob = await new Promise(res => cv.toBlob(res, "image/png"));
      bytes = new Uint8Array(await blob.arrayBuffer()); mime = "image/png";
    }
    const dims = await imgDims(bytes, mime);
    const aId = uid(); assets.set(aId, { bytes, mime });
    const pvId = uid(); previews.set(pvId, URL.createObjectURL(new Blob([bytes], { type: mime })));
    commit();
    const size = fitWithin(dims.w * 72 / 96, dims.h * 72 / 96, A4.w * 0.6, A4.h * 0.6);
    const off = cascadeOffset(sheet().objects.length);
    sheet().objects.push({ id: uid(), type: "image",
      x: clamp((A4.w - size.w) / 2 + off, 0, A4.w - size.w),
      y: clamp((A4.h - size.h) / 3 + off, 0, A4.h - size.h),
      w: size.w, h: size.h, assetId: aId, previewId: pvId });
    state.sel = sheet().objects[sheet().objects.length - 1].id;
    renderSheet();
    toast(`Added ${file.name}`);
  } catch (e) { console.error(e); toast(`Could not read ${file.name}`); }
}
function imgDims(bytes, mime){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight });
    img.onerror = rej;
    img.src = URL.createObjectURL(new Blob([bytes], { type: mime }));
  });
}

/* --- object tool actions --- */
function withSel(fn){ const o = state.sel && findObj(state.sel); if (o) { commit(); fn(o); renderSheet(); } }
els.delObj.onclick   = () => withSel(o => { sheet().objects = sheet().objects.filter(x => x.id !== o.id); state.sel = null; });
els.toFront.onclick  = () => withSel(o => { const a = sheet().objects; a.splice(a.indexOf(o), 1); a.push(o); });
els.toBack.onclick   = () => withSel(o => { const a = sheet().objects; a.splice(a.indexOf(o), 1); a.unshift(o); });
els.dupObj.onclick   = () => withSel(o => { const c = JSON.parse(JSON.stringify(o)); c.id = uid(); c.x += 12; c.y += 12; sheet().objects.push(c); state.sel = c.id; });
els.fontPlus.onclick = () => withSel(o => { if (o.type === "text") o.size = clamp(o.size + 2, 6, 96); });
els.fontMinus.onclick= () => withSel(o => { if (o.type === "text") o.size = clamp(o.size - 2, 6, 96); });
els.textColor.oninput= e  => withSel(o => { if (o.type === "text") o.color = e.target.value; });

/* --- sheet nav --- */
els.addSheet.onclick = () => { commit(); state.sheets.splice(state.curSheet + 1, 0, { id: uid(), objects: [] }); state.curSheet++; state.sel = null; renderSheet(); };
els.delSheet.onclick = () => {
  if (state.sheets.length === 1) return;
  if (sheet().objects.length && !confirm("Delete this sheet and everything on it?")) return;
  commit(); state.sheets.splice(state.curSheet, 1);
  state.curSheet = clamp(state.curSheet, 0, state.sheets.length - 1);
  state.sel = null; renderSheet();
};
els.prevSheet.onclick = () => { state.curSheet = clamp(state.curSheet - 1, 0, state.sheets.length - 1); state.sel = null; renderSheet(); };
els.nextSheet.onclick = () => { state.curSheet = clamp(state.curSheet + 1, 0, state.sheets.length - 1); state.sel = null; renderSheet(); };

/* ================================================================
   EXPORT — the whole point: vector-preserved clips via embedPage
   ================================================================ */
async function exportPdf(){
  els.exportBtn.disabled = true; els.exportBtn.textContent = "Exporting…";
  try {
    const out = await PDFDocument.create();
    const font = await out.embedFont(StandardFonts.Helvetica);
    const libDocs = new Map(), embedCache = new Map(), imgCache = new Map();

    for (const sh of state.sheets) {
      const page = out.addPage([A4.w, A4.h]);
      for (const o of sh.objects) {
        const oy = pdfYFromTop(A4.h, o.y, o.h || 0);
        if (o.type === "snippet") {
          const src = state.sources.find(s => s.id === o.srcId);
          if (!src) continue;
          if (!libDocs.has(src.id))
            libDocs.set(src.id, await PDFDocument.load(src.bytes, { ignoreEncryption: true }));
          const key = `${o.srcId}|${o.srcPage}|${o.bbox.left.toFixed(2)},${o.bbox.bottom.toFixed(2)},${o.bbox.right.toFixed(2)},${o.bbox.top.toFixed(2)}`;
          if (!embedCache.has(key)) {
            const sp = libDocs.get(src.id).getPage(o.srcPage - 1);
            embedCache.set(key, await out.embedPage(sp, o.bbox));
          }
          const p = drawParamsFor(o.rot, o.x, oy, o.w, o.h);
          page.drawPage(embedCache.get(key),
            { x: p.x, y: p.y, width: p.width, height: p.height, rotate: degrees(p.deg) });
        } else if (o.type === "image") {
          const a = assets.get(o.assetId); if (!a) continue;
          if (!imgCache.has(o.assetId))
            imgCache.set(o.assetId, a.mime === "image/jpeg" ? await out.embedJpg(a.bytes) : await out.embedPng(a.bytes));
          page.drawImage(imgCache.get(o.assetId), { x: o.x, y: oy, width: o.w, height: o.h });
        } else if (o.type === "text") {
          const size = o.size, lineH = size * 1.3, ascent = size * 0.75;
          const col = hexRgb(o.color);
          const lines = sanitizeWinAnsi(o.text).split("\n");
          lines.forEach((line, i) => {
            if (!line) return;
            page.drawText(line, { x: o.x, y: A4.h - o.y - ascent - i * lineH,
              size, font, color: rgb(col.r, col.g, col.b), maxWidth: o.w, lineHeight: lineH });
          });
        }
      }
    }
    const bytes = await out.save();
    const blob = new Blob([bytes], { type: "application/pdf" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "paper-clips.pdf";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    toast("Exported — clips stay vector ✓");
  } catch (e) {
    console.error(e); toast("Export failed: " + e.message, 5000);
  } finally {
    els.exportBtn.disabled = false; els.exportBtn.textContent = "Export PDF";
  }
}
function hexRgb(hex){
  const n = parseInt(hex.slice(1), 16);
  return { r: ((n >> 16) & 255) / 255, g: ((n >> 8) & 255) / 255, b: (n & 255) / 255 };
}

/* ================================================================
   FILES IN — open button + drag & drop anywhere
   ================================================================ */
function routeFiles(list){
  for (const f of list) {
    if (f.type === "application/pdf" || /\.pdf$/i.test(f.name)) addPdf(f);
    else if (f.type.startsWith("image/")) addImage(f);
    else toast(`Skipped ${f.name} (not a PDF or image)`);
  }
}
els.openBtn.onclick = () => els.fileInput.click();
els.fileInput.onchange = e => { routeFiles(e.target.files); e.target.value = ""; };
let dragDepth = 0;
window.addEventListener("dragenter", e => { e.preventDefault(); if (++dragDepth === 1) els.dropVeil.style.display = "block"; });
window.addEventListener("dragleave", e => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; els.dropVeil.style.display = "none"; } });
window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("drop", e => {
  e.preventDefault(); dragDepth = 0; els.dropVeil.style.display = "none";
  if (e.dataTransfer?.files?.length) routeFiles(e.dataTransfer.files);
});

els.clearCropBtn.onclick = () => setCrop(null);

els.redoBtn.onclick = doRedo;

document.addEventListener("keydown", e => {
  const editing = document.activeElement?.isContentEditable || /input|select|textarea/i.test(document.activeElement?.tagName || "");
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") { e.preventDefault(); e.shiftKey ? doRedo() : doUndo(); return; }
  if (editing) return;
  if (e.key === "Escape") { setCrop(null); select(null); if (state.editObj) exitEditMode(); }
  if (!state.sel) return;
  const o = findObj(state.sel); if (!o) return;
  const step = e.shiftKey ? 10 : 1;
  if (e.key === "Backspace" || e.key === "Delete") { e.preventDefault(); els.delObj.click(); }
  else if (e.key === "ArrowLeft")  { commit(); o.x -= step; renderSheet(); }
  else if (e.key === "ArrowRight") { commit(); o.x += step; renderSheet(); }
  else if (e.key === "ArrowUp")    { commit(); o.y -= step; renderSheet(); }
  else if (e.key === "ArrowDown")  { commit(); o.y += step; renderSheet(); }
});

/* mobile tabs */
function switchTab(id){
  document.querySelectorAll("#split section.pane").forEach(p => p.classList.toggle("active", p.id === id));
  document.querySelectorAll("#tabs button").forEach(b => b.classList.toggle("on", b.dataset.t === id));
  if (id === "layoutPane") renderSheet(); else renderCropPage();
}
els.tabs.addEventListener("click", e => { const b = e.target.closest("button"); if (b) switchTab(b.dataset.t); });

let rsT;
window.addEventListener("resize", () => { clearTimeout(rsT); rsT = setTimeout(() => { renderSheet(); if (state.curSrc) { setCrop(null); renderCropPage(); } }, 160); });

/* ================================================================
   BUILT-IN TESTS (open with 🧪 or ?test=1)
   ================================================================ */
function runTests(){
  const out = []; let pass = 0, fail = 0;
  const eq = (name, got, want) => {
    const ok = JSON.stringify(got) === JSON.stringify(want);
    ok ? pass++ : fail++;
    out.push(`${ok ? "✓" : "✗ FAIL"}  ${name}${ok ? "" : `\n      got:  ${JSON.stringify(got)}\n      want: ${JSON.stringify(want)}`}`);
  };
  const near = (name, got, want, tol = 0.01) => {
    const ok = Math.abs(got - want) <= tol;
    ok ? pass++ : fail++;
    out.push(`${ok ? "✓" : "✗ FAIL"}  ${name}${ok ? "" : ` (got ${got}, want ${want})`}`);
  };

  eq("normRot 450 → 90", normRot(450), 90);
  eq("normRot -90 → 270", normRot(-90), 270);
  eq("bbox normalizes corners", bboxFromPdfPoints([50, 700], [200, 500]), { left: 50, right: 200, bottom: 500, top: 700 });
  eq("visualDims rot 0", visualDims({ left: 0, right: 100, bottom: 0, top: 40 }, 0), { w: 100, h: 40 });
  eq("visualDims rot 90 swaps", visualDims({ left: 0, right: 100, bottom: 0, top: 40 }, 90), { w: 40, h: 100 });
  eq("drawParams rot 0",   drawParamsFor(0, 10, 20, 100, 50),   { x: 10, y: 20, width: 100, height: 50, deg: 0 });
  eq("drawParams rot 90",  drawParamsFor(90, 10, 20, 100, 50),  { x: 10, y: 70, width: 50, height: 100, deg: -90 });
  eq("drawParams rot 180", drawParamsFor(180, 10, 20, 100, 50), { x: 110, y: 70, width: 100, height: 50, deg: 180 });
  eq("drawParams rot 270", drawParamsFor(270, 10, 20, 100, 50), { x: 110, y: 20, width: 50, height: 100, deg: 90 });
  near("pdfYFromTop", pdfYFromTop(841.89, 100, 50), 691.89);
  eq("clamp", [clamp(5, 0, 3), clamp(-2, 0, 3), clamp(2, 0, 3)], [3, 0, 2]);
  eq("fitWithin downscales", fitWithin(200, 100, 100, 100), { w: 100, h: 50 });
  eq("fitWithin never upscales", fitWithin(50, 20, 100, 100), { w: 50, h: 20 });
  eq("sanitize keeps Danish æøå ÆØÅ", sanitizeWinAnsi("æøå ÆØÅ – ok"), "æøå ÆØÅ – ok");
  eq("sanitize replaces Arabic", sanitizeWinAnsi("abمرحباc"), "ab?????c");
  eq("cascade cycles", [cascadeOffset(0), cascadeOffset(3), cascadeOffset(8)], [0, 42, 0]);
  const h = makeHistory(2);
  h.commit("a"); h.commit("b"); h.commit("c");
  eq("history caps at 2", h.sizes().u, 2);
  eq("history undo returns last", h.undo("cur"), "c");
  eq("history redo returns", h.redo("c2"), "cur");
  const hd = makeHistory(5); eq("history empty undo → null", hd.undo("x"), null);

  const summary = `${pass} passed, ${fail} failed`;
  els.testOut.innerHTML = out.map(l =>
    `<span class="${l.startsWith("✓") ? "pass" : "fail"}">${l.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</span>`).join("\n") + `\n\n${summary}`;
  els.testOverlay.hidden = false;
  return fail === 0;
}
els.testsBtn.onclick = runTests;
els.closeTests.onclick = () => els.testOverlay.hidden = true;

/* ---------------- boot ---------------- */
renderSheet();
if (new URLSearchParams(location.search).has("test")) runTests();
</script>
