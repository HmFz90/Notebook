<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Paper Pages">
<meta name="theme-color" content="#FAF7EE">
<title>Paper Pages</title>
<style>
:root{--desk:#EDE8D8;--paper:#FAF7EE;--dot:rgba(90,80,60,.13);--card:#fff;--line:rgba(28,25,18,.11);--line2:rgba(28,25,18,.2);--ink:#1D1B16;--sub:#75705F;--mut:#A49D8B;--acc:#3B63E8;--red:#D93B3B;--grn:#2F8F4E;--blkbg:rgba(255,255,255,.78);--scrim:rgba(20,18,12,.38);--btn:#1D1B16;--btnfg:#FAF7EE}
[data-theme="dark"]{--desk:#191712;--paper:#211F1A;--dot:rgba(255,255,255,.075);--card:#2C2923;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.22);--ink:#ECE8DB;--sub:#B5AE9C;--mut:#7E7767;--acc:#7D97F2;--red:#E06060;--grn:#57A874;--blkbg:rgba(44,41,35,.86);--scrim:rgba(0,0,0,.55);--btn:#ECE8DB;--btnfg:#211F1A}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink)}
#vp{position:fixed;inset:0;touch-action:none;background:var(--desk);cursor:default;overflow:hidden}
#vp.panning{cursor:grabbing}
#world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#alayer{position:absolute;left:0;top:0;width:1px;height:1px;overflow:visible}
.page{position:absolute;background-color:var(--paper);background-image:radial-gradient(var(--dot) 1px,transparent 1px);background-size:22px 22px;border:1px solid var(--line);border-radius:4px;box-shadow:0 10px 30px rgba(15,12,4,.10)}
.pglbl{position:absolute;font-size:10px;color:var(--mut);user-select:none;-webkit-user-select:none}
.addpg{position:absolute;display:flex;gap:9px;align-items:center;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:6px 13px;font-size:12px;color:var(--sub);user-select:none;-webkit-user-select:none}
.addpg span[data-pg]{cursor:pointer}
.addpg span[data-pg]:hover{color:var(--acc)}
.addpg .sep2{width:1px;height:12px;background:var(--line)}
.xmini.on{background:var(--btn);color:var(--btnfg);border-color:transparent}
.ar{fill:none;stroke:var(--sub);stroke-width:1.6;pointer-events:stroke;cursor:pointer}
.ar.on{stroke:var(--acc);stroke-width:2.2}
.blk{position:absolute;background:var(--blkbg);border:1px solid var(--line);border-radius:10px;padding:9px 11px;line-height:1.5;white-space:pre-wrap;overflow-wrap:break-word;user-select:none;-webkit-user-select:none;cursor:grab}
.blk:active{cursor:grabbing}
.blk.img{padding:0;overflow:hidden;background:var(--card)}
.blk.img img{display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;user-select:none;-webkit-user-drag:none}
.blk.panel{border:2px solid var(--ink);border-radius:4px;background:var(--card)}
.snum{position:absolute;min-width:22px;height:22px;padding:0 5px;border-radius:99px;background:var(--btn);color:var(--btnfg);font-size:11.5px;font-weight:650;display:flex;align-items:center;justify-content:center;pointer-events:none;border:2px solid var(--card);z-index:2}
.snum.off{background:var(--card);color:var(--mut);border:1.5px dashed var(--line2)}
.ln{display:block;min-height:1.2em}
.ln.h1{font-size:1.5em;font-weight:650;letter-spacing:-.01em;line-height:1.28}
.ln.h2{font-size:1.22em;font-weight:600;line-height:1.32}
.ln.l1,.ln.l2,.ln.l3{position:relative}
.ln.l1{padding-left:1.2em}.ln.l1::before{content:'•';position:absolute;left:.2em}
.ln.l2{padding-left:2.4em}.ln.l2::before{content:'◦';position:absolute;left:1.4em}
.ln.l3{padding-left:3.6em}.ln.l3::before{content:'▪';position:absolute;left:2.6em;font-size:.8em;top:.15em}
.ln a{color:var(--acc);text-decoration:underline;cursor:pointer}
.ln b{font-weight:650}
.pill{position:fixed;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 10px;z-index:22;user-select:none;-webkit-user-select:none;max-width:calc(100vw - 24px)}
#tl{top:12px;left:12px}
#tr{top:12px;right:12px}
.ib{width:27px;height:27px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;color:var(--sub);cursor:pointer;flex:none;border:0;background:transparent;padding:0}
.ib:hover{background:var(--paper)}
.ib.on{background:var(--btn);color:var(--btnfg)}
.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block}
.sep{width:1px;height:16px;background:var(--line);flex:none}
#pname{font-size:13px;font-weight:550;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
#sdot{width:7px;height:7px;border-radius:99px;background:var(--grn);flex:none}
#slab{font-size:12px;color:var(--sub);white-space:nowrap}
#rail{position:fixed;left:12px;top:76px;display:flex;flex-direction:column;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px;z-index:21}
#drawer{position:fixed;left:60px;top:76px;width:242px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;z-index:21;max-height:calc(100vh - 230px);overflow:auto;overscroll-behavior:contain}
#outp{position:fixed;left:60px;top:76px;width:214px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;z-index:19;max-height:calc(100vh - 215px);overflow:auto;overscroll-behavior:contain}
@media (min-width:760px){html[data-out="1"] #drawer{left:284px}}
#dhead,#ohead{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--sub);margin-bottom:4px}
#dhead .ib,#ohead .ib{margin-left:auto;width:22px;height:22px}
.prow,.orow,.srow{display:flex;align-items:center;gap:7px;padding:7px 2px;border-top:1px solid var(--line);font-size:12.5px;cursor:pointer;min-height:32px}
.prow:hover,.orow:hover,.srow:hover{color:var(--acc)}
.prow .sub,.srow .sub{font-size:10.5px;color:var(--mut)}
.prow .ib{margin-left:auto;width:22px;height:22px;visibility:hidden}
.prow:hover .ib{visibility:visible}
.grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.orow.h2{padding-left:16px;color:var(--sub)}
.dz{border:1.5px dashed var(--line2);border-radius:9px;padding:14px 8px;text-align:center;color:var(--mut);font-size:11px;margin-top:6px}
.dz.hot{border-color:var(--acc);color:var(--acc)}
#thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
#thumbs img{width:52px;height:52px;object-fit:cover;border-radius:7px;border:1px solid var(--line);cursor:pointer}
.in{font-size:12.5px;padding:7px 9px;border:1px solid var(--line2);border-radius:8px;background:var(--paper);color:var(--ink);width:100%;outline:none;font-family:inherit}
.in:focus{border-color:var(--acc)}
.btn{font-size:12.5px;padding:7px 13px;border:1px solid var(--line2);border-radius:999px;background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn.dark{background:var(--btn);color:var(--btnfg);border-color:transparent}
.btn.sm{font-size:11.5px;padding:5px 10px}
#comp{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(580px,calc(100vw - 92px));background:var(--card);border:1px solid var(--line2);border-radius:16px;padding:9px 11px;z-index:23}
#ebar{font-size:11px;color:var(--acc);padding:0 2px 7px;display:flex;align-items:center;gap:6px}
#ebar .ib{width:20px;height:20px;margin-left:auto}
#chips{display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}
#chips::-webkit-scrollbar{display:none}
.chip{font-size:11.5px;padding:4px 8px;border-radius:7px;color:var(--sub);cursor:pointer;white-space:nowrap;flex:none;border:0;background:transparent;font-family:inherit}
.chip.on{background:var(--btn);color:var(--btnfg)}
.fctl{font-size:11.5px;padding:4px 7px;border:1px solid var(--line2);border-radius:7px;background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap;flex:none;font-family:inherit}
.fctl.on{background:var(--btn);color:var(--btnfg);border-color:transparent}
select.fctl{-webkit-appearance:none;appearance:none}
.cdot{width:14px;height:14px;border-radius:99px;cursor:pointer;flex:none;border:0;padding:0}
.cdot.on{outline:2px solid var(--ink);outline-offset:2px}
.cdot[data-c="ink"]{background:var(--ink)}
.cdot[data-c="acc"]{background:var(--acc)}
.cdot[data-c="red"]{background:var(--red)}
.cdot[data-c="grn"]{background:var(--grn)}
#lform{display:flex;align-items:center;gap:6px;background:color-mix(in srgb,var(--acc) 9%,var(--card));border:1px solid color-mix(in srgb,var(--acc) 30%,transparent);border-radius:9px;padding:6px 8px;margin-bottom:8px}
#crow{display:flex;align-items:flex-end;gap:8px}
#ta{flex:1;min-height:24px;max-height:138px;resize:none;border:0;outline:0;background:transparent;font-family:inherit;font-size:14px;line-height:1.45;color:var(--ink);padding:4px 2px}
#send{width:38px;height:38px;flex:none;border-radius:999px;background:var(--btn);color:var(--btnfg);border:0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
#send .ic{width:17px;height:17px}
#zoomp{position:fixed;bottom:14px;left:12px;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 4px;z-index:20}
#zlab{font-size:10px;color:var(--sub);cursor:pointer;padding:2px 0}
#sel{position:fixed;inset:0;pointer-events:none;z-index:15}
.selr{position:absolute;border:1.5px solid var(--acc);border-radius:9px}
.selr.g{border-style:dashed}
.hnd{position:absolute;width:9px;height:9px;background:var(--card);border:1.5px solid var(--acc);border-radius:2px;pointer-events:auto}
.hnd.e{cursor:ew-resize}.hnd.se{cursor:nwse-resize}
.adot{position:absolute;width:12px;height:12px;border-radius:99px;background:var(--card);border:1.5px solid var(--sub);pointer-events:auto;cursor:crosshair}
.adot:hover{border-color:var(--acc)}
.mtb{position:absolute;display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line2);border-radius:9px;padding:3px 6px;pointer-events:auto;white-space:nowrap}
.mtb .ib{width:24px;height:24px}
.mtb .cdot{width:11px;height:11px}
.mtb .lbl{font-size:11px;padding:3px 7px;cursor:pointer;color:var(--ink);border-radius:6px}
.mtb .lbl:hover{background:var(--paper)}
#marq{position:fixed;border:1px dashed var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent);display:none;z-index:14;pointer-events:none}
#tline{position:fixed;inset:0;pointer-events:none;z-index:14;width:100%;height:100%;overflow:visible;display:none}
#tline path{fill:none;stroke:var(--acc);stroke-width:1.6;stroke-dasharray:5 4}
#toasts{position:fixed;bottom:128px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:50;pointer-events:none}
.toast{background:var(--btn);color:var(--btnfg);font-size:12px;padding:7px 14px;border-radius:999px;max-width:80vw}
#dlg{position:fixed;inset:0;background:var(--scrim);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px}
#dcard{width:min(460px,94vw);max-height:84vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 17px}
.dt{font-size:13.5px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.dsub{font-size:12px;color:var(--sub);margin:-4px 0 10px}
.dbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.brow{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--line);font-size:12px}
.brow .btn{margin-left:auto}
.tglrow{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12px;margin-bottom:10px}
.tgl{margin-left:auto;width:30px;height:17px;border-radius:99px;background:var(--line2);position:relative;cursor:pointer;flex:none;border:0;padding:0}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:99px;background:var(--card);transition:left .15s}
.tgl.on{background:var(--grn)}
.tgl.on::after{left:15px}
#expm{position:fixed;top:56px;right:12px;width:288px;background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:11px 13px;z-index:35}
.seg{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.segb{font-size:10.5px;padding:4px 9px;border-radius:999px;color:var(--sub);cursor:pointer;border:0;background:transparent;font-family:inherit}
.segb.on{background:var(--btn);color:var(--btnfg)}
.segb:disabled{opacity:.4;cursor:default}
.btn:disabled{opacity:.45;cursor:default}
#seqbar{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:24;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:7px 12px;font-size:12px;max-width:calc(100vw - 20px);flex-wrap:wrap;justify-content:center}
.xrow{display:flex;gap:9px;align-items:center;padding:8px 0;border-top:1px solid var(--line);cursor:pointer}
.xrow:hover .xt{color:var(--acc)}
.xi{width:27px;height:27px;border-radius:8px;background:var(--paper);color:var(--sub);display:flex;align-items:center;justify-content:center;flex:none}
.xt{font-size:12.5px;font-weight:550}
.xs{font-size:10.5px;color:var(--mut);line-height:1.35}
.xmini{font-size:10.5px;padding:3px 8px;border:1px solid var(--line2);border-radius:99px;background:var(--card);color:var(--ink);cursor:pointer;font-family:inherit}
.hint{font-size:10.5px;color:var(--mut);margin-top:6px}
button:focus-visible,.ib:focus-visible,.chip:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
@media (max-width:560px){#comp{width:calc(100vw - 88px)}#slab{display:none}}
</style>
</head>
<body>
<div id="vp">
  <div id="world">
    <div id="pages"></div>
    <svg id="alayer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0.6 L6.6,4 L0,7.4" fill="none" style="stroke:var(--sub)" stroke-width="1.5" stroke-linecap="round"/></marker>
        <marker id="ahs" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto"><path d="M0,0.6 L6.6,4 L0,7.4" fill="none" style="stroke:var(--acc)" stroke-width="1.7" stroke-linecap="round"/></marker>
      </defs>
      <g id="apaths"></g>
    </svg>
    <div id="blocks"></div>
  </div>
</div>
<svg id="tline" xmlns="http://www.w3.org/2000/svg"><path id="tpath" d=""/></svg>
<div id="marq"></div>
<div id="sel"></div>

<div class="pill" id="tl">
  <span class="ib" data-i="book" style="cursor:default"></span>
  <span id="pname" title="Papers — double-click to rename">Paper</span>
  <button class="ib" id="btnPapers" data-i="chev" title="All papers"></button>
  <span class="sep"></span>
  <button class="ib" id="btnNew" data-i="plus" title="New paper"></button>
  <button class="ib" id="btnSearch" data-i="search" title="Search all papers"></button>
</div>

<div class="pill" id="tr">
  <span id="sdot"></span><span id="slab">Saved</span>
  <span class="sep"></span>
  <button class="ib" id="btnUndo" data-i="undo" title="Undo (⌘Z)"></button>
  <button class="ib" id="btnRedo" data-i="redo" title="Redo (⌘⇧Z)"></button>
  <button class="ib" id="btnExp" data-i="down" title="Export"></button>
  <button class="ib" id="btnTheme" data-i="moon" title="Light / dark"></button>
  <button class="ib" id="btnSet" data-i="gear" title="Backups &amp; data"></button>
</div>

<div id="rail">
  <button class="ib" data-d="search" data-i="search" title="Search"></button>
  <button class="ib" data-d="outline" data-i="list" title="Outline"></button>
  <button class="ib" data-d="images" data-i="photo" title="Images"></button>
  <button class="ib" data-d="papers" data-i="stack" title="Papers"></button>
</div>
<div id="drawer" hidden><div id="dhead"></div><div id="dbody"></div></div>
<div id="outp" hidden><div id="ohead">OUTLINE<button class="ib" id="ocol" data-i="x" title="Hide outline — the rail icon brings it back"></button></div><div id="outbody"></div></div>

<div id="comp">
  <div id="ebar" hidden><span data-i="pencil" style="display:inline-flex"></span>Editing block — Send updates it, Esc cancels<button class="ib" id="ecancel" data-i="x" title="Cancel edit"></button></div>
  <div id="chips">
    <button class="chip" data-p="h1">H1</button>
    <button class="chip" data-p="h2">H2</button>
    <button class="chip on" data-p="p">Text</button>
    <span class="sep"></span>
    <button class="chip" data-p="l1">• 1</button>
    <button class="chip" data-p="l2">•• 2</button>
    <button class="chip" data-p="l3">••• 3</button>
    <span class="sep"></span>
    <button class="chip" id="chLink">Link</button>
    <span style="flex:1"></span>
    <select class="fctl" id="fFont" title="Font"><option value="sans">Sans</option><option value="serif">Serif</option><option value="mono">Mono</option><option value="hand">Hand</option></select>
    <select class="fctl" id="fSize" title="Size"><option>12</option><option>13</option><option selected>14</option><option>15</option><option>16</option><option>18</option><option>20</option><option>24</option></select>
    <button class="fctl" id="fB" style="font-weight:650;width:26px" title="Bold">B</button>
    <button class="fctl" id="fI" style="font-style:italic;width:26px" title="Italic">I</button>
    <span class="sep"></span>
    <button class="cdot on" data-c="ink" title="Black"></button>
    <button class="cdot" data-c="acc" title="Blue"></button>
    <button class="cdot" data-c="red" title="Red"></button>
    <button class="cdot" data-c="grn" title="Green"></button>
  </div>
  <div id="lform" hidden>
    <input class="in" id="ltxt" placeholder="Text to show" style="flex:1">
    <input class="in" id="lurl" placeholder="https://" style="flex:1.2">
    <button class="btn dark sm" id="lins">Insert</button>
    <button class="ib" id="lx" data-i="x"></button>
  </div>
  <div id="crow">
    <textarea id="ta" rows="1" placeholder="Write a note…   ⌘/Ctrl + Enter places it"></textarea>
    <button id="send" data-i="up" title="Send to paper (⌘Enter)"></button>
  </div>
</div>

<div id="zoomp">
  <button class="ib" id="zin" data-i="plus" title="Zoom in"></button>
  <span id="zlab" title="Fit page">100</span>
  <button class="ib" id="zout" data-i="minus" title="Zoom out"></button>
</div>

<div id="seqbar" hidden><span style="color:var(--sub)" id="seqmsg">Click blocks in reading order</span><span class="sep"></span><button class="segb" data-sl="strip">Strip</button><button class="segb on" data-sl="grid">Grid</button><button class="segb" data-sl="vertical">Vertical</button><span class="sep"></span><button class="btn sm dark" id="seqgo" disabled>Create comic</button><button class="ib" id="seqx" data-i="x" title="Cancel"></button></div>
<div id="expm" hidden></div>
<div id="dlg" hidden><div id="dcard"></div></div>
<div id="toasts"></div>
<input type="file" id="fimp" accept=".json,application/json" hidden>
<script>
'use strict';
/* ---------- utils ---------- */
const $=id=>document.getElementById(id);
const uid=()=>'x'+Date.now().toString(36).slice(-4)+Math.random().toString(36).slice(2,8);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const css=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const FONTS={sans:"-apple-system,system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",serif:"Georgia,'Iowan Old Style','Times New Roman',serif",mono:"ui-monospace,'SF Mono',Menlo,Consolas,monospace",hand:"'Bradley Hand','Segoe Print','Comic Sans MS',cursive"};
const CKEY={ink:'--ink',acc:'--acc',red:'--red',grn:'--grn'};
const CVAL=k=>`var(${CKEY[k]||'--ink'})`;
const ICONS={
plus:'<path d="M12 5v14M5 12h14"/>',

function measureTextH(b,w){return layoutText(Object.assign({},b,{w:Math.max(60,Math.round(w))})).h}
function textWidthFor(b,H){let lo=120,hi=780;if(measureTextH(b,hi)>H)return null;for(let i=0;i<9;i++){const mid=(lo+hi)/2;if(measureTextH(b,mid)<=H)hi=mid;else lo=mid}return Math.ceil(hi)+2}
function natAspect(b){if(b.t==='img')return b.w/Math.max(1,b.h);return 240/Math.max(30,measureTextH(b,240))}
function layoutComic(c){const bs=c.ch.map(blk).filter(Boolean);if(bs.length<2)return null;
 let ax=1e15,ay=1e15;bs.forEach(b=>{ax=Math.min(ax,b.x);ay=Math.min(ay,b.y)});
 if(!c.W){const wsum=bs.reduce((s,b)=>s+b.w,0);c.W=Math.round(clamp(wsum*0.55,320,PG().w-2*PGM))}
 const W=c.W,G=10,L=c.layout||'grid';
 const items=bs.map(b=>({b,a:natAspect(b),img:b.t==='img'}));
 const tiers=[];
 if(L==='vertical')items.forEach(it=>tiers.push({kind:'row',its:[it]}));
 else if(L==='strip')tiers.push({kind:'row',its:items.slice()});
 else{let i=0;
  while(i<items.length){const it=items[i];
   const splash=(it.img&&it.a>2.2)||(!it.img&&measureTextH(it.b,340)>360);
   if(splash){tiers.push({kind:'row',its:[it]});i++;continue}
   if(it.img&&it.a<0.62&&i+1<items.length){const k=Math.min(2,items.length-1-i);tiers.push({kind:'tall',tall:it,col:items.slice(i+1,i+1+k)});i+=1+k;continue}
   const row=[it];
   if(i+1<items.length){const nx=items[i+1];if(!(nx.img&&(nx.a>2.2||nx.a<0.62)))row.push(nx)}
   tiers.push({kind:'row',its:row});i+=row.length}}
 let y=ay;
 for(const t of tiers){
  if(t.kind==='row'){const its=t.its,n=its.length;
   if(n===1){const it=its[0],b=it.b;b.x=Math.round(ax);b.y=Math.round(y);b.w=W;
    if(it.img){b.h=Math.round(W/it.a);y+=b.h+G}else{b.ph=measureTextH(b,W);y+=b.ph+G}continue}
   let H=120;
   for(let p=0;p<3;p++){const S=its.reduce((s,it)=>s+it.a,0);H=(W-G*(n-1))/Math.max(0.2,S);
    its.forEach(it=>{if(!it.img){const w=textWidthFor(it.b,H);it.a=(w==null?W*0.62:w)/H}})}
   let ws=its.map(it=>it.a*H);const sc=(W-G*(n-1))/ws.reduce((s,w)=>s+w,0);ws=ws.map(w=>w*sc);
   let H2=H;its.forEach((it,j)=>{if(!it.img)H2=Math.max(H2,measureTextH(it.b,ws[j]))});
   let x=ax;its.forEach((it,j)=>{const b=it.b;b.x=Math.round(x);b.y=Math.round(y);b.w=Math.round(ws[j]);
    if(it.img)b.h=Math.round(H2);else b.ph=Math.round(H2);x+=ws[j]+G});
   y+=Math.round(H2)+G}
  else{const a=t.tall.a,col=t.col;
   const S=col.reduce((s,it)=>s+1/Math.max(0.2,it.a),0),Gk=G*(col.length-1);
   let wT=clamp(((W-G)*S+Gk)/(1/a+S),W*0.3,W*0.62);
   let wC=W-G-wT;
   col.forEach(it=>{if(!it.img)it.a=wC/Math.max(30,measureTextH(it.b,wC))});
   const S2=col.reduce((s,it)=>s+1/it.a,0);
   wT=clamp(((W-G)*S2+Gk)/(1/a+S2),W*0.3,W*0.62);
   wC=W-G-wT;const H2=wT/a;
   let hs=col.map(it=>wC/it.a);const inner=Math.max(40,H2-Gk);const s2=inner/hs.reduce((s,h)=>s+h,0);hs=hs.map(h=>h*s2);
   let yy=y;
   col.forEach((it,j)=>{const cb=it.b;cb.x=Math.round(ax+wT+G);cb.y=Math.round(yy);cb.w=Math.round(wC);
    if(it.img)cb.h=Math.round(hs[j]);else cb.ph=Math.round(Math.max(hs[j],measureTextH(cb,wC)));
    yy+=(it.img?cb.h:cb.ph)+G});
   const HT=Math.max(H2,yy-G-y);const b=t.tall.b;b.x=Math.round(ax);b.y=Math.round(y);b.w=Math.round(wT);b.h=Math.round(HT);
   y+=Math.round(HT)+G}}

 PIDX=docs.map(d=>({id:d.id,name:d.name,updated:d.updated})).sort((a,b)=>b.updated-a.updated);
 let id=(SET.last&&PIDX.some(p=>p.id===SET.last))?SET.last:(PIDX[0]&&PIDX[0].id);
 if(!id){const d=starterDoc();await dput('docs',d);idxUpdate(d);id=d.id}
 bindUI();
 if(SET.outline===undefined)SET.outline=innerWidth>=760;
 applyOutline();
 await openPaper(id);
 syncComposer();syncChips();taGrow();
}catch(e){console.error(e);alert('Paper Pages could not start: '+(e&&e.message||e))}}
boot();
</script>
